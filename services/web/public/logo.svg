<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Three overlapping hearts matching the Miamo Dating App logo -->
  
  <!-- Left heart (deep magenta/purple) -->
  <path d="M60 95 C60 75, 40 60, 25 60 C10 60, 0 75, 0 90 C0 120, 60 155, 60 155 C60 155, 60 120, 60 95Z" 
        transform="translate(30, 25) scale(0.9)" 
        fill="url(#leftHeart)"/>
  
  <!-- Right heart (hot pink) -->
  <path d="M60 95 C60 75, 80 60, 95 60 C110 60, 120 75, 120 90 C120 120, 60 155, 60 155 C60 155, 60 120, 60 95Z" 
        transform="translate(55, 20) scale(0.95)" 
        fill="url(#rightHeart)"/>
  
  <!-- Smaller front heart (coral/salmon pink) -->
  <path d="M40 65 C40 50, 25 42, 18 42 C8 42, 0 52, 0 62 C0 82, 40 105, 40 105 C40 105, 80 82, 80 62 C80 52, 72 42, 62 42 C55 42, 40 50, 40 65Z" 
        transform="translate(60, 60) scale(0.65)" 
        fill="url(#frontHeart)"/>
  
  <defs>
    <!-- Deep magenta gradient for left heart -->
    <linearGradient id="leftHeart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#D81B60"/>
    </linearGradient>
    
    <!-- Hot pink gradient for right heart -->
    <linearGradient id="rightHeart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E91E63"/>
      <stop offset="100%" stop-color="#EC407A"/>
    </linearGradient>
    
    <!-- Coral/salmon gradient for front heart -->
    <linearGradient id="frontHeart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#F48FB1"/>
    </linearGradient>
  </defs>
</svg>
