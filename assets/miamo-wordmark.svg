  <path d="M 110.5 8 C 110.5 4.5 113 2 116 2 C 119 2 121.5 4.5 121.5 8 C 121.5 4.5 124 2 127 2 C 130 2 132.5 4.5 132.5 8 C 132.5 14 121.5 20 121.5 20 C 121.5 20 110.5 14 110.5 8 Z" fill="url(#hs)"/>

