<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 90" width="400" height="90">
  <defs>
    <!-- 3D Heart gradient -->
    <linearGradient id="hg" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#F4ADA4"/>
      <stop offset="50%" stop-color="#E8998D"/>
      <stop offset="100%" stop-color="#C97856"/>
    </linearGradient>
    <!-- Heart highlight -->
    <radialGradient id="hs" cx="30%" cy="25%" r="45%">
