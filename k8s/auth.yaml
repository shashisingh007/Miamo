apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: miamo
  labels:
    app: miamo
    service: auth
spec:
  type: ClusterIP
  selector:
    app: miamo
    service: auth
  ports:
    - port: 3201
      targetPort: 3201
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: miamo
  labels:
    app: miamo
    service: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: miamo
      service: auth
  template:
    metadata:
      labels:
        app: miamo
        service: auth
    spec:
      containers:
        - name: auth
          image: miamo-auth:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3201
          envFrom:
            - configMapRef:
                name: miamo-config
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3201
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 3201
            initialDelaySeconds: 5
            periodSeconds: 5
