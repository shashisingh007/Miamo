apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: miamo
  labels:
    app: miamo
    service: gateway
spec:
  type: ClusterIP
  selector:
    app: miamo
    service: gateway
  ports:
    - port: 3200
      targetPort: 3200
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: miamo
  labels:
    app: miamo
    service: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: miamo
      service: gateway
  template:
    metadata:
      labels:
        app: miamo
        service: gateway
    spec:
      containers:
        - name: gateway
          image: miamo-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3200
          envFrom:
            - configMapRef:
                name: miamo-config
          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth.miamo.svc.cluster.local:3201"
            - name: USERS_SERVICE_URL
              value: "http://users.miamo.svc.cluster.local:3202"
            - name: SOCIAL_SERVICE_URL
              value: "http://social.miamo.svc.cluster.local:3203"
            - name: MESSAGING_SERVICE_URL
              value: "http://messaging.miamo.svc.cluster.local:3204"
            - name: CONTENT_SERVICE_URL
              value: "http://content.miamo.svc.cluster.local:3205"
            - name: NOTIFICATIONS_SERVICE_URL
              value: "http://notifications.miamo.svc.cluster.local:3206"
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3200
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 3200
            initialDelaySeconds: 5
            periodSeconds: 5
