apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: miamo
  labels:
    app: miamo
    service: gateway
spec:
  type: NodePort
  selector:
    app: miamo
    service: gateway
  ports:
    - port: 3200
      targetPort: 3200
      nodePort: 30200
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: miamo
  labels:
    app: miamo
    service: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: miamo
      service: gateway
  template:
    metadata:
      labels:
        app: miamo
        service: gateway
    spec:
      containers:
        - name: gateway
          image: miamo-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3200
          envFrom:
            - configMapRef:
                name: miamo-config
          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth:3201"
            - name: USER_SERVICE_URL
              value: "http://users:3202"
            - name: USERS_SERVICE_URL
              value: "http://users:3202"
            - name: SOCIAL_SERVICE_URL
              value: "http://social:3203"
            - name: MESSAGING_SERVICE_URL
              value: "http://messaging:3204"
            - name: CONTENT_SERVICE_URL
              value: "http://content:3205"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notifications:3206"
            - name: NOTIFICATIONS_SERVICE_URL
              value: "http://notifications:3206"
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3200
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3200
            initialDelaySeconds: 5
            periodSeconds: 5
