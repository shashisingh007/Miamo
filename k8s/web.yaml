apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: miamo
  labels:
    app: miamo
    service: web
spec:
  type: NodePort
  selector:
    app: miamo
    service: web
  ports:
    - port: 3100
      targetPort: 3100
      nodePort: 30100
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: miamo
  labels:
    app: miamo
    service: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: miamo
      service: web
  template:
    metadata:
      labels:
        app: miamo
        service: web
    spec:
      containers:
        - name: web
          image: miamo-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3100
          envFrom:
            - configMapRef:
                name: miamo-config
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /
              port: 3100
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3100
            initialDelaySeconds: 5
            periodSeconds: 10
