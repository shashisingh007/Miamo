apiVersion: v1
kind: Service
metadata:
  name: users
  namespace: miamo
  labels:
    app: miamo
    service: users
spec:
  type: ClusterIP
  selector:
    app: miamo
    service: users
  ports:
    - port: 3202
      targetPort: 3202
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: users
  namespace: miamo
  labels:
    app: miamo
    service: users
spec:
  replicas: 1
  selector:
    matchLabels:
      app: miamo
      service: users
  template:
    metadata:
      labels:
        app: miamo
        service: users
    spec:
      containers:
        - name: users
          image: miamo-users:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3202
          envFrom:
            - configMapRef:
                name: miamo-config
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3202
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3202
            initialDelaySeconds: 5
            periodSeconds: 5
