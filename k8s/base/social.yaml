# ─── Miamo Social Service K8s ─────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: miamo-social
  namespace: miamo
  labels:
    app: miamo-social
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: miamo-social
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: miamo-social
        tier: backend
    spec:
      containers:
        - name: social
          image: miamo-social:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3203
          env:
            - name: PORT
              value: "3203"
          envFrom:
            - configMapRef:
                name: miamo-config
            - secretRef:
                name: miamo-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3203
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 3203
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: miamo-social
  namespace: miamo
spec:
  selector:
    app: miamo-social
  ports:
    - port: 3203
      targetPort: 3203
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: miamo-social-hpa
  namespace: miamo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: miamo-social
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
