# ─── Miamo API Gateway K8s ────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: miamo-gateway
  namespace: miamo
  labels:
    app: miamo-gateway
    tier: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: miamo-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: miamo-gateway
        tier: gateway
    spec:
      containers:
        - name: gateway
          image: miamo-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3200
              name: http
          env:
            - name: PORT
              value: "3200"
          envFrom:
            - configMapRef:
                name: miamo-config
            - secretRef:
                name: miamo-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3200
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3200
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: miamo-gateway
  namespace: miamo
spec:
  selector:
    app: miamo-gateway
  ports:
    - port: 3200
      targetPort: 3200
      name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: miamo-gateway-hpa
  namespace: miamo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: miamo-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
