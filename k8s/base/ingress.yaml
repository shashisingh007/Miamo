# ─── Miamo Ingress ────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: miamo-ingress
  namespace: miamo
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "15"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  ingressClassName: nginx
  rules:
    - host: miamo.local
      http:
        paths:
          # All API traffic goes through the gateway
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: miamo-gateway
                port:
                  number: 3200
          - path: /health
            pathType: Exact
            backend:
              service:
                name: miamo-gateway
                port:
                  number: 3200
          # Web frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: miamo-web
                port:
                  number: 3100
---
# ─── Network Policy ──────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: miamo-network-policy
  namespace: miamo
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app: miamo
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              app: miamo
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
