apiVersion: v1
kind: ConfigMap
metadata:
  name: miamo-config
  namespace: miamo
data:
  NODE_ENV: "production"
  FRONTEND_URL: "http://miamo-web:3100"
  REDIS_URL: "redis://miamo-redis:6379"
  STORAGE_PROVIDER: "local"
  # Service discovery
  AUTH_SERVICE_URL: "http://miamo-auth:3201"
  USER_SERVICE_URL: "http://miamo-users:3202"
  SOCIAL_SERVICE_URL: "http://miamo-social:3203"
  MESSAGING_SERVICE_URL: "http://miamo-messaging:3204"
  CONTENT_SERVICE_URL: "http://miamo-content:3205"
  NOTIFICATION_SERVICE_URL: "http://miamo-notifications:3206"
---
apiVersion: v1
kind: Secret
metadata:
  name: miamo-secrets
  namespace: miamo
type: Opaque
stringData:
  DATABASE_URL: "postgresql://miamo:miamo_prod_pass@miamo-postgres:5432/miamo"
  JWT_SECRET: "CHANGE-THIS-IN-PRODUCTION-USE-RANDOM-64-CHARS"
  JWT_REFRESH_SECRET: "CHANGE-THIS-IN-PRODUCTION-REFRESH-USE-RANDOM-64-CHARS"
  POSTGRES_PASSWORD: "miamo_prod_pass"
  INTERNAL_SERVICE_KEY: "CHANGE-THIS-IN-PRODUCTION-INTERNAL-KEY"
