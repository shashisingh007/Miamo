# ─── PostgreSQL for dev/testing ───────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: miamo-postgres-pvc
  namespace: miamo
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: miamo-postgres
  namespace: miamo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: miamo-postgres
  template:
    metadata:
      labels:
        app: miamo-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: miamo
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: miamo-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: miamo
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "miamo"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "miamo"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: miamo-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: miamo-postgres
  namespace: miamo
spec:
  selector:
    app: miamo-postgres
  ports:
    - port: 5432
      targetPort: 5432
