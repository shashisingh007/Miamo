# ─── Miamo Notification Service K8s ───────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: miamo-notifications
  namespace: miamo
  labels:
    app: miamo-notifications
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: miamo-notifications
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: miamo-notifications
        tier: backend
    spec:
      containers:
        - name: notifications
          image: miamo-notifications:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3206
          env:
            - name: PORT
              value: "3206"
          envFrom:
            - configMapRef:
                name: miamo-config
            - secretRef:
                name: miamo-secrets
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3206
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 3206
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: miamo-notifications
  namespace: miamo
spec:
  selector:
    app: miamo-notifications
  ports:
    - port: 3206
      targetPort: 3206
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: miamo-notifications-hpa
  namespace: miamo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: miamo-notifications
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
