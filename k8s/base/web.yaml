# ─── Miamo Web Deployment ─────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: miamo-web
  namespace: miamo
  labels:
    app: miamo-web
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: miamo-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: miamo-web
        tier: frontend
    spec:
      containers:
        - name: web
          image: miamo-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3100
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://miamo-gateway:3200"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 3100
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: miamo-web
  namespace: miamo
spec:
  selector:
    app: miamo-web
  ports:
    - port: 3100
      targetPort: 3100
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: miamo-web-hpa
  namespace: miamo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: miamo-web
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
