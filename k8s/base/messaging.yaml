# ─── Miamo Messaging Service K8s ──────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: miamo-messaging
  namespace: miamo
  labels:
    app: miamo-messaging
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: miamo-messaging
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: miamo-messaging
        tier: backend
    spec:
      containers:
        - name: messaging
          image: miamo-messaging:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3204
          env:
            - name: PORT
              value: "3204"
          envFrom:
            - configMapRef:
                name: miamo-config
            - secretRef:
                name: miamo-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3204
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 3204
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: miamo-messaging
  namespace: miamo
spec:
  selector:
    app: miamo-messaging
  ports:
    - port: 3204
      targetPort: 3204
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: miamo-messaging-hpa
  namespace: miamo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: miamo-messaging
  minReplicas: 2
  maxReplicas: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
