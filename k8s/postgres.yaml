apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: miamo
  labels:
    app: miamo
    service: postgres
spec:
  clusterIP: None
  selector:
    app: miamo
    service: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: miamo
  labels:
    app: miamo
    service: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: miamo
      service: postgres
  template:
    metadata:
      labels:
        app: miamo
        service: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "miamo"
            - name: POSTGRES_PASSWORD
              value: "miamo"
            - name: POSTGRES_DB
              value: "miamo"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - miamo
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - miamo
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
