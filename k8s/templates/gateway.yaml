# ═══ Gateway Template ═══
# The gateway gets NodePort + service URL env vars
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: __NAMESPACE__
  labels:
    app: miamo
    service: gateway
spec:
  type: NodePort
  selector:
    app: miamo
    service: gateway
  ports:
    - port: __SERVICE_PORT__
      targetPort: __GATEWAY_PORT__
      nodePort: __GATEWAY_NODEPORT__
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: __NAMESPACE__
  labels:
    app: miamo
    service: gateway
spec:
  replicas: __REPLICAS__
  selector:
    matchLabels:
      app: miamo
      service: gateway
  template:
    metadata:
      labels:
        app: miamo
        service: gateway
    spec:
      containers:
        - name: gateway
          image: __IMAGE_PREFIX__miamo-gateway:__IMAGE_TAG__
          imagePullPolicy: __PULL_POLICY__
          ports:
            - containerPort: __GATEWAY_PORT__
          envFrom:
            - configMapRef:
                name: miamo-config
          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth:__SERVICE_PORT__"
            - name: USER_SERVICE_URL
              value: "http://users:__SERVICE_PORT__"
            - name: USERS_SERVICE_URL
              value: "http://users:__SERVICE_PORT__"
            - name: SOCIAL_SERVICE_URL
              value: "http://social:__SERVICE_PORT__"
            - name: MESSAGING_SERVICE_URL
              value: "http://messaging:__SERVICE_PORT__"
            - name: CONTENT_SERVICE_URL
              value: "http://content:__SERVICE_PORT__"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notifications:__SERVICE_PORT__"
            - name: NOTIFICATIONS_SERVICE_URL
              value: "http://notifications:__SERVICE_PORT__"
          resources:
            requests:
              memory: "__REQ_MEM__"
              cpu: "__REQ_CPU__"
            limits:
              memory: "__LIM_MEM__"
              cpu: "__LIM_CPU__"
          livenessProbe:
            httpGet:
              path: /health
              port: __GATEWAY_PORT__
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: __GATEWAY_PORT__
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
