# ═══ Redis StatefulSet — Persistent Data ═══
# Uses appendonly for durability + PVC for persistence across restarts
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: __NAMESPACE__
  labels:
    app: miamo
    service: redis
spec:
  clusterIP: None
  selector:
    app: miamo
    service: redis
  ports:
    - port: __REDIS_PORT__
      targetPort: __REDIS_PORT__
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: __NAMESPACE__
  labels:
    app: miamo
    service: redis
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: miamo
      service: redis
  template:
    metadata:
      labels:
        app: miamo
        service: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: __REDIS_PORT__
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - "256mb"
            - --maxmemory-policy
            - allkeys-lru
            - --save
            - "60"
            - "1000"
            - --dir
            - /data
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
