# ═══ Miamo Secrets Template ════════════════════════════════════════
# Sensitive values that must NOT live in a ConfigMap.
#
# Production deployment options (in order of preference):
#   1. External Secrets Operator pulling from AWS Secrets Manager /
#      Google Secret Manager / Azure Key Vault / HashiCorp Vault.
#   2. Sealed Secrets (bitnami) with the encrypted blob committed to git.
#   3. This template populated by your CI from a secure store and
#      `kubectl apply`-ed (NEVER commit the rendered file).
#
# The values below are placeholders intended for the existing
# scripts/start.sh substitution flow. If you opt in, the
# deployment manifests must also list `secretRef: { name: miamo-secrets }`
# in their envFrom block. The keys here override matching keys in
# miamo-config when both are referenced (last envFrom wins in K8s).
apiVersion: v1
kind: Secret
metadata:
  name: miamo-secrets
  namespace: __NAMESPACE__
  labels:
    app: miamo
    env: __ENV__
type: Opaque
stringData:
  # ─── Required in production (fail-fast at boot if missing) ─────
  JWT_SECRET: "__JWT_SECRET__"
  JWT_REFRESH_SECRET: "__JWT_REFRESH_SECRET__"
  INTERNAL_SERVICE_KEY: "__INTERNAL_KEY__"
  ENCRYPTION_KEY: "__ENCRYPTION_KEY__"
  ENCRYPTION_SALT: "__ENCRYPTION_SALT__"
  # ─── Connection strings (contain credentials) ──────────────────
  DATABASE_URL: "__DATABASE_URL__"
  REDIS_URL: "__REDIS_URL__"
