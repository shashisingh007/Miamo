apiVersion: v1
kind: ConfigMap
metadata:
  name: miamo-config
  namespace: miamo
  labels:
    app: miamo
data:
  DATABASE_URL: "postgresql://miamo:miamo@postgres:5432/miamo?schema=public"
  REDIS_URL: "redis://redis:6379"
  JWT_SECRET: "miamo-jwt-secret-change-in-production"
  INTERNAL_SERVICE_KEY: "miamo-internal-key-change-in-production"
  FRONTEND_URL: "http://web:3100"
  NODE_ENV: "production"
  AUTH_PORT: "3201"
  USERS_PORT: "3202"
  SOCIAL_PORT: "3203"
  MESSAGING_PORT: "3204"
  CONTENT_PORT: "3205"
  NOTIFICATIONS_PORT: "3206"
  GATEWAY_PORT: "3200"
  WEB_PORT: "3100"
