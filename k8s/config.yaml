apiVersion: v1
kind: ConfigMap
metadata:
  name: miamo-config
  namespace: miamo
  labels:
    app: miamo
data:
  DATABASE_URL: "postgresql://miamo:miamo@postgres.miamo.svc.cluster.local:5432/miamo?schema=public"
  REDIS_URL: "redis://redis.miamo.svc.cluster.local:6379"
  JWT_SECRET: "miamo-jwt-secret-change-in-production"
  INTERNAL_SERVICE_KEY: "miamo-internal-key-change-in-production"
  FRONTEND_URL: "http://web.miamo.svc.cluster.local:3100"
  NODE_ENV: "production"
