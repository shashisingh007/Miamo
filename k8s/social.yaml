apiVersion: v1
kind: Service
metadata:
  name: social
  namespace: miamo
  labels:
    app: miamo
    service: social
spec:
  type: ClusterIP
  selector:
    app: miamo
    service: social
  ports:
    - port: 3203
      targetPort: 3203
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: social
  namespace: miamo
  labels:
    app: miamo
    service: social
spec:
  replicas: 1
  selector:
    matchLabels:
      app: miamo
      service: social
  template:
    metadata:
      labels:
        app: miamo
        service: social
    spec:
      containers:
        - name: social
          image: miamo-social:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3203
          envFrom:
            - configMapRef:
                name: miamo-config
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3203
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3203
            initialDelaySeconds: 5
            periodSeconds: 5
