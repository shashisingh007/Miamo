apiVersion: v1
kind: Service
metadata:
  name: content
  namespace: miamo
  labels:
    app: miamo
    service: content
spec:
  type: ClusterIP
  selector:
    app: miamo
    service: content
  ports:
    - port: 3205
      targetPort: 3205
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: content
  namespace: miamo
  labels:
    app: miamo
    service: content
spec:
  replicas: 1
  selector:
    matchLabels:
      app: miamo
      service: content
  template:
    metadata:
      labels:
        app: miamo
        service: content
    spec:
      containers:
        - name: content
          image: miamo-content:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3205
          envFrom:
            - configMapRef:
                name: miamo-config
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3205
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3205
            initialDelaySeconds: 5
            periodSeconds: 5
