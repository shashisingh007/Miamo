apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: miamo
  labels:
    app: miamo
    service: redis
spec:
  selector:
    app: miamo
    service: redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: miamo
  labels:
    app: miamo
    service: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: miamo
      service: redis
  template:
    metadata:
      labels:
        app: miamo
        service: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
