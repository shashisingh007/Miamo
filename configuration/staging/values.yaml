# ═══════════════════════════════════════════════════════════════════
# Miamo — Staging Environment Configuration
# ═══════════════════════════════════════════════════════════════════
# Usage: bash scripts/start.sh staging
# ═══════════════════════════════════════════════════════════════════

# ─── Cluster ──────────────────────────────────────────────────────
cluster_host: "127.0.0.1"
namespace: "miamo-staging"
env: "staging"

# ─── Service Port (exposed by k8s Services — same for all) ───────
service_port: 443

# ─── Container Ports (internal, inside pods) ──────────────────────
container_ports:
  auth: 3201
  users: 3202
  social: 3203
  messaging: 3204
  content: 3205
  notifications: 3206
  gateway: 3200
  web: 3100

# ─── NodePorts (host-accessible, 30000-32767 range) ──────────────
node_ports:
  gateway: 30081
  web: 30444

# ─── Docker Images ────────────────────────────────────────────────
images:
  registry: ""
  tag: "staging"
  pull_policy: "Always"

# ─── Database ─────────────────────────────────────────────────────
database:
  host: "postgres"
  port: 5432
  name: "miamo"
  user: "miamo"
  password: "miamo-staging-change-me"

# ─── Redis ────────────────────────────────────────────────────────
redis:
  host: "redis"
  port: 6379

# ─── Secrets ──────────────────────────────────────────────────────
secrets:
  jwt_secret: "miamo-jwt-secret-staging-change-me"
  internal_service_key: "miamo-internal-key-staging-change-me"

# ─── Resources (per pod) ─────────────────────────────────────────
resources:
  requests_memory: "64Mi"
  requests_cpu: "100m"
  limits_memory: "256Mi"
  limits_cpu: "500m"

# ─── Scaling ──────────────────────────────────────────────────────
replicas: 2

# ─── Node Environment ────────────────────────────────────────────
node_env: "staging"
