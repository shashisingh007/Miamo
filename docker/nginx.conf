# Miamo — Cloudflare origin reverse proxy
#
# Cloudflare terminates HTTPS at the edge and forwards HTTP:80 to this box.
# We route the two host-name variants:
#   miamo.in / www.miamo.in  →  web (Next.js on :3100)
#   api.miamo.in             →  gateway (API on :3200)
#
# Real client IP is preserved via the CF-Connecting-IP header (Cloudflare sets
# it). Rate-limiting + WAF live at the Cloudflare edge, so nginx here is a
# thin router only.

# Trust Cloudflare's edge network so $remote_addr becomes the real user IP.
# Full list at https://www.cloudflare.com/ips-v4/
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
real_ip_header CF-Connecting-IP;

# ─── API (api.miamo.in → gateway) ─────────────────────
server {
    listen 80;
    server_name api.miamo.in;
    client_max_body_size 20m;      # user photo uploads

    location / {
        proxy_pass http://gateway:3200;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}

# ─── Web (miamo.in / www.miamo.in → Next.js) ──────────
server {
    listen 80 default_server;
    server_name miamo.in www.miamo.in _;
    client_max_body_size 20m;

    location / {
        proxy_pass http://web:3100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Health check for uptime probes — always 200 regardless of upstream.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
