# ═══════════════════════════════════════════════════════════════
# Miamo — Docker Compose
# ═══════════════════════════════════════════════════════════════
#
# Architecture:
#   Browser → web (:3100) → gateway (:3200) → microservices (:3201-3206)
#                                            → postgres + redis
#
# Quick Start:
#   docker-compose up -d              Start everything
#   docker-compose up -d --build      Rebuild & start
#   docker-compose down               Stop (keeps data)
#   docker-compose down -v            Stop + wipe DB
#   docker-compose logs -f <service>  Stream logs
#
# ═══════════════════════════════════════════════════════════════

x-env: &env
  NODE_ENV: production
  DATABASE_URL: postgresql://miamo:miamo_dev_pass@postgres:5432/miamo_dev
  REDIS_URL: redis://redis:6379
  INTERNAL_SERVICE_KEY: miamo-internal-dev-key
  JWT_SECRET: miamo-dev-jwt-secret-change-in-production-2026
  JWT_REFRESH_SECRET: miamo-dev-refresh-secret-change-in-production-2026
  FRONTEND_URL: http://localhost:3100

x-depends: &depends
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy
  migrate:
    condition: service_completed_successfully

x-resources: &resources
  deploy:
    resources:
      limits:
        memory: 256M
        cpus: '0.5'
      reservations:
        memory: 64M
        cpus: '0.1'

services:
  # ─── Infrastructure ───────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: miamo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: miamo
      POSTGRES_PASSWORD: miamo_dev_pass
      POSTGRES_DB: miamo_dev
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/config/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
      - ./docker/config/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miamo -d miamo_dev"]
      interval: 3s
      timeout: 2s
      retries: 15
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  redis:
    image: redis:7-alpine
    container_name: miamo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/config/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 3s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.3'

  # ─── Database Init (run-once) ─────────────────────────
  migrate:
    build:
      context: .
      dockerfile: docker/migrate.Dockerfile
    container_name: miamo-migrate
    environment:
      DATABASE_URL: postgresql://miamo:miamo_dev_pass@postgres:5432/miamo_dev
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─── Microservices ────────────────────────────────────
  auth:
    build:
      context: .
      dockerfile: docker/auth.Dockerfile
    container_name: miamo-auth
    restart: unless-stopped
    expose: ["3201"]
    environment:
      <<: *env
      PORT: "3201"
    depends_on: *depends
    <<: *resources

  users:
    build:
      context: .
      dockerfile: docker/users.Dockerfile
    container_name: miamo-users
    restart: unless-stopped
    expose: ["3202"]
    environment:
      <<: *env
      PORT: "3202"
    depends_on: *depends
    <<: *resources

  social:
    build:
      context: .
      dockerfile: docker/social.Dockerfile
    container_name: miamo-social
    restart: unless-stopped
    expose: ["3203"]
    environment:
      <<: *env
      PORT: "3203"
    depends_on: *depends
    <<: *resources

  messaging:
    build:
      context: .
      dockerfile: docker/messaging.Dockerfile
    container_name: miamo-messaging
    restart: unless-stopped
    expose: ["3204"]
    environment:
      <<: *env
      PORT: "3204"
    depends_on: *depends
    <<: *resources

  content:
    build:
      context: .
      dockerfile: docker/content.Dockerfile
    container_name: miamo-content
    restart: unless-stopped
    expose: ["3205"]
    environment:
      <<: *env
      PORT: "3205"
    depends_on: *depends
    <<: *resources

  notifications:
    build:
      context: .
      dockerfile: docker/notifications.Dockerfile
    container_name: miamo-notifications
    restart: unless-stopped
    expose: ["3206"]
    environment:
      <<: *env
      PORT: "3206"
    depends_on: *depends
    <<: *resources

  # ─── API Gateway (public backend) ────────────────────
  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    container_name: miamo-gateway
    restart: unless-stopped
    ports:
      - "3200:3200"
    environment:
      PORT: "3200"
      NODE_ENV: production
      JWT_SECRET: miamo-dev-jwt-secret-change-in-production-2026
      INTERNAL_SERVICE_KEY: miamo-internal-dev-key
      FRONTEND_URL: http://localhost:3100
      AUTH_SERVICE_URL: http://auth:3201
      USER_SERVICE_URL: http://users:3202
      SOCIAL_SERVICE_URL: http://social:3203
      MESSAGING_SERVICE_URL: http://messaging:3204
      CONTENT_SERVICE_URL: http://content:3205
      NOTIFICATION_SERVICE_URL: http://notifications:3206
    depends_on:
      auth:
        condition: service_healthy
      users:
        condition: service_healthy
      social:
        condition: service_healthy
      messaging:
        condition: service_healthy
      content:
        condition: service_healthy
      notifications:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # ─── Web Frontend (Next.js) ──────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: miamo-web
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3200
    depends_on:
      gateway:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

volumes:
  pg_data:
  redis_data:

networks:
  default:
    name: miamo-network
