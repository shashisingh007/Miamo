# ─── Miamo Docker Compose — Local Development ────────
# Usage: docker compose up -d
# Data: Persists in named volumes (postgres_data, redis_data)
# All data survives container restarts and rebuilds.

version: '3.9'

services:
  # ─── Database (Persistent) ─────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: miamo-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-miamo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — copy .env.example to .env}
      POSTGRES_DB: ${POSTGRES_DB:-miamo}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miamo"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Cache (Persistent) ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: miamo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ─── Database Migration ─────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: docker/migrate.Dockerfile
    container_name: miamo-migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-miamo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-miamo}?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Gateway ───────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    container_name: miamo-gateway
    ports:
      - "3200:3200"
    environment: &common-env
      DATABASE_URL: postgresql://${POSTGRES_USER:-miamo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-miamo}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — generate with: openssl rand -hex 64}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:?INTERNAL_SERVICE_KEY is required — generate with: openssl rand -hex 32}
      NODE_ENV: ${NODE_ENV:-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3100}
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth:3201
      USER_SERVICE_URL: http://users:3202
      SOCIAL_SERVICE_URL: http://social:3203
      MESSAGING_SERVICE_URL: http://messaging:3204
      CONTENT_SERVICE_URL: http://content:3205
      NOTIFICATION_SERVICE_URL: http://notifications:3206
    depends_on:
      - auth
      - users
      - social
      - messaging
      - content
      - notifications
    restart: unless-stopped

  # ─── Microservices ─────────────────────────────────
  auth:
    build: { context: ., dockerfile: docker/auth.Dockerfile }
    container_name: miamo-auth
    environment:
      <<: *common-env
      PORT: "3201"
    depends_on:
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    restart: unless-stopped

  users:
    build: { context: ., dockerfile: docker/users.Dockerfile }
    container_name: miamo-users
    environment:
      <<: *common-env
      PORT: "3202"
    depends_on:
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    restart: unless-stopped

  social:
    build: { context: ., dockerfile: docker/social.Dockerfile }
    container_name: miamo-social
    environment:
      <<: *common-env
      PORT: "3203"
    depends_on:
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    restart: unless-stopped

  messaging:
    build: { context: ., dockerfile: docker/messaging.Dockerfile }
    container_name: miamo-messaging
    environment:
      <<: *common-env
      PORT: "3204"
    depends_on:
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    restart: unless-stopped

  content:
    build: { context: ., dockerfile: docker/content.Dockerfile }
    container_name: miamo-content
    environment:
      <<: *common-env
      PORT: "3205"
    depends_on:
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    restart: unless-stopped

  notifications:
    build: { context: ., dockerfile: docker/notifications.Dockerfile }
    container_name: miamo-notifications
    environment:
      <<: *common-env
      PORT: "3206"
    depends_on:
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    restart: unless-stopped

  # ─── Web Frontend ──────────────────────────────────
  web:
    build: { context: ., dockerfile: docker/web.Dockerfile }
    container_name: miamo-web
    ports:
      - "3100:3100"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3200
      PORT: "3100"
    depends_on:
      - gateway
    restart: unless-stopped

# ─── Persistent Volumes ─────────────────────────────
# Data persists across container restarts, stops, and rebuilds
volumes:
  postgres_data:
    driver: local
    name: miamo_postgres_data
  redis_data:
    driver: local
    name: miamo_redis_data
