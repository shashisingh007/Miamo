version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    groups:
      patch-updates:
        update-types: ["patch"]
      minor-updates:
        update-types: ["minor"]
    ignore:
      # Major upgrades reviewed manually
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels: ["dependencies", "automerge-patch"]

  - package-ecosystem: "npm"
    directory: "/services/web"
    schedule: { interval: "weekly", day: "monday", time: "06:00" }
    open-pull-requests-limit: 10
    groups:
      patch-updates: { update-types: ["patch"] }
      minor-updates: { update-types: ["minor"] }
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/services/shared"
    schedule: { interval: "weekly", day: "monday", time: "06:00" }
    open-pull-requests-limit: 5
    groups:
      patch-updates: { update-types: ["patch"] }
      minor-updates: { update-types: ["minor"] }
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/docker"
    schedule: { interval: "weekly", day: "monday", time: "06:00" }
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule: { interval: "weekly", day: "monday", time: "06:00" }
